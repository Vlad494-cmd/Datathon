document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

flet-tooltip-bottom:before,\r\n.leaflet-tooltip-top:before {\r\n\tleft: 50%;\r\n\tmargin-left: -6px;\r\n\t}\r\n.leaflet-tooltip-top:before {\r\n\tbottom: 0;\r\n\tmargin-bottom: -12px;\r\n\tborder-top-color: #fff;\r\n\t}\r\n.leaflet-tooltip-bottom:before {\r\n\ttop: 0;\r\n\tmargin-top: -12px;\r\n\tmargin-left: -6px;\r\n\tborder-bottom-color: #fff;\r\n\t}\r\n.leaflet-tooltip-left {\r\n\tmargin-left: -6px;\r\n}\r\n.leaflet-tooltip-right {\r\n\tmargin-left: 6px;\r\n}\r\n.leaflet-tooltip-left:before,\r\n.leaflet-tooltip-right:before {\r\n\ttop: 50%;\r\n\tmargin-top: -6px;\r\n\t}\r\n.leaflet-tooltip-left:before {\r\n\tright: 0;\r\n\tmargin-right: -12px;\r\n\tborder-left-color: #fff;\r\n\t}\r\n.leaflet-tooltip-right:before {\r\n\tleft: 0;\r\n\tmargin-left: -12px;\r\n\tborder-right-color: #fff;\r\n\t}\r\n\r\n/* Printing */\r\n\t\r\n@media print {\r\n\t/* Prevent printers from removing background-images of controls. */\r\n\t.leaflet-control {\r\n\t\t-webkit-print-color-adjust: exact;\r\n\t\tprint-color-adjust: exact;\r\n\t\t}\r\n\t}\r\n<\u002Fstyle>\n<script src=\"e3f8d7b3-a325-4418-8651-d4398ff984ff\"><\u002Fscript>\n<!-- Offline tile cache (~677KB, all CartoDB dark tiles covering Spain z5-7) -->\n<script src=\"78c84705-f265-44c9-a0a2-53d6b99a3a38\"><\u002Fscript>\n<style>\n*{margin:0;padding:0;box-sizing:border-box}\n:root{\n  --bg:#060c18;--panel:#0b1526;--card:#0f1d32;--border:#1a3050;--border-b:#1e4a7a;\n  --red:#ef4444;--amber:#f59e0b;--green:#22c55e;--blue:#38bdf8;--teal:#2dd4bf;\n  --text:#e2e8f0;--muted:#64748b;--accent:#38bdf8;\n}\nhtml,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;overflow:hidden}\n\n#app{display:flex;height:100vh;width:100vw}\n#sidebar{width:355px;min-width:355px;height:100%;display:flex;flex-direction:column;background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;overflow-x:hidden;z-index:10}\n#sidebar::-webkit-scrollbar{width:4px}\n#sidebar::-webkit-scrollbar-thumb{background:var(--border-b);border-radius:4px}\n#map-area{flex:1;position:relative}\n#map{width:100%;height:100%}\n\n/* HEADER */\n#hdr{padding:20px 20px 16px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#0d1e38 0%,var(--panel) 100%)}\n.eyebrow{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--blue);font-weight:600;margin-bottom:6px}\n.title{font-size:18px;font-weight:700;color:#f0f9ff;line-height:1.2;margin-bottom:4px}\n.subtitle{font-size:11px;color:var(--muted);line-height:1.5}\n.live{display:inline-block;width:6px;height:6px;background:var(--green);border-radius:50%;margin-right:5px;animation:pulse 2s infinite}\n@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.4)}50%{box-shadow:0 0 0 5px rgba(34,197,94,0)}}\n\n/* SECTIONS */\n.sec{padding:16px 18px}\n.slabel{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}\n.slabel::after{content:'';flex:1;height:1px;background:var(--border)}\n\n/* KPI */\n.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}\n.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px 15px;position:relative;overflow:hidden}\n.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}\n.kpi.b::before{background:linear-gradient(90deg,var(--blue),var(--teal))}\n.kpi.a::before{background:linear-gradient(90deg,var(--amber),#fb923c)}\n.kpi.r::before{background:linear-gradient(90deg,var(--red),#f97316)}\n.kpi.g::before{background:linear-gradient(90deg,var(--green),var(--teal))}\n.kpi-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:500;margin-bottom:5px}\n.kpi-v{font-size:22px;font-weight:700;font-family:'Space Mono',monospace;line-height:1;color:#f0f9ff}\n.kpi-v span{font-size:11px;font-weight:400;color:var(--muted);margin-left:2px}\n.kpi-s{font-size:10px;color:var(--muted);margin-top:3px}\n\n/* FILTERS */\n.pill-row{display:flex;gap:6px;flex-wrap:wrap}\n.pill{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-family:'Space Grotesk',sans-serif;cursor:pointer;transition:all .18s;font-weight:500}\n.pill:hover{border-color:var(--border-b);color:var(--text)}\n.pill.on-all{background:var(--blue);border-color:var(--blue);color:#000;font-weight:700}\n.pill.on-green{background:var(--green);border-color:var(--green);color:#000;font-weight:700}\n.pill.on-yellow{background:var(--amber);border-color:var(--amber);color:#000;font-weight:700}\n.pill.on-red{background:var(--red);border-color:var(--red);color:#fff;font-weight:700}\n\n/* HEATMAP TOGGLE */\n.tog-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;cursor:pointer}\n.tog-label{font-size:12px;font-weight:500;color:var(--text)}\n.tog-sub{font-size:10px;color:var(--muted)}\n.toggle{width:36px;height:20px;background:var(--border);border-radius:10px;position:relative;cursor:pointer;border:none;transition:background .2s;flex-shrink:0}\n.toggle.on{background:var(--accent)}\n.toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}\n.toggle.on::after{left:18px}\n\n/* LEGEND */\n.leg-block{display:flex;flex-direction:column;gap:9px}\n.leg-item{border:1px solid var(--border);border-radius:10px;padding:10px 12px;background:var(--card)}\n.leg-top{display:flex;align-items:center;gap:8px;margin-bottom:5px}\n.leg-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;border:2px solid rgba(255,255,255,.15)}\n.leg-name{font-size:12px;font-weight:600;flex:1}\n.leg-cnt{font-size:12px;font-family:'Space Mono',monospace;font-weight:700}\n.leg-desc{font-size:10.5px;color:var(--muted);line-height:1.55}\n.leg-desc strong{color:var(--text);font-weight:500}\n.leg-tag{display:inline-block;padding:1px 7px;border-radius:4px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-top:5px}\n.leg-tag.warn{background:rgba(245,158,11,.15);color:var(--amber);border:1px solid rgba(245,158,11,.3)}\n.leg-tag.info{background:rgba(56,189,248,.12);color:var(--blue);border:1px solid rgba(56,189,248,.25)}\n.leg-tag.ok{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.25)}\n\n/* SIZE LEGEND */\n.size-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:10px}\n.sz-circ{border-radius:50%;background:rgba(100,116,139,.3);border:1.5px solid var(--muted);flex-shrink:0}\n.sz-lbl{font-size:10px;color:var(--muted)}\n\n/* POPUP */\n.leaflet-popup-content-wrapper{background:rgba(11,21,38,.97);border:1px solid var(--border-b);border-radius:10px;color:var(--text);font-family:'Space Grotesk',sans-serif;box-shadow:0 8px 32px rgba(0,0,0,.6);padding:0;overflow:hidden}\n.leaflet-popup-content{margin:0;width:240px!important}\n.leaflet-popup-tip{background:rgba(11,21,38,.97)}\n.p-head{padding:10px 14px 8px;border-bottom:1px solid var(--border)}\n.p-id{font-size:14px;font-weight:700;font-family:'Space Mono',monospace;color:#f0f9ff}\n.p-route{font-size:11px;color:var(--muted);margin-top:1px}\n.p-body{padding:8px 14px 10px;display:flex;flex-direction:column;gap:4px}\n.p-row{display:flex;justify-content:space-between;font-size:12px}\n.p-row .pk{color:var(--muted)}.p-row .pv{font-weight:600;color:var(--text)}\n.p-badge{display:inline-block;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-top:4px}\n.p-badge.Congested{background:rgba(239,68,68,.2);color:var(--red);border:1px solid rgba(239,68,68,.3)}\n.p-badge.Moderate{background:rgba(245,158,11,.2);color:var(--amber);border:1px solid rgba(245,158,1 ,route:\"N-5A\",chargers:4,demand:600,priority:0.069,grid:\"Moderate\"},\n  {id:\"IBE_069\",lat:38.975,lng:-0.164,route:\"N-337\",chargers:4,demand:600,priority:0.069,grid:\"Moderate\"},\n  {id:\"IBE_070\",lat:40.529,lng:-2.810,route:\"N-320A\",chargers:4,demand:600,priority:0.069,grid:\"Moderate\"},\n  {id:\"IBE_071\",lat:42.603,lng:-8.642,route:\"N-550A\",chargers:4,demand:600,priority:0.069,grid:\"Moderate\"},\n  {id:\"IBE_072\",lat:42.629,lng:-3.858,route:\"N-627\",chargers:4,demand:600,priority:0.069,grid:\"Moderate\"},\n  {id:\"IBE_073\",lat:42.723,lng:-4.056,route:\"N-627\",chargers:4,demand:600,priority:0.069,grid:\"Moderate\"},\n  {id:\"IBE_074\",lat:42.361,lng:-7.854,route:\"N-544\",chargers:4,demand:600,priority:0.069,grid:\"Moderate\"},\n  {id:\"IBE_075\",lat:43.113,lng:-2.519,route:\"N-636\",chargers:4,demand:600,priority:0.069,grid:\"Moderate\"},\n  {id:\"IBE_076\",lat:42.847,lng:-7.126,route:\"N-6A\",chargers:4,demand:600,priority:0.069,grid:\"Moderate\"},\n  {id:\"IBE_077\",lat:42.969,lng:-3.849,route:\"N-623\",chargers:4,demand:600,priority:0.047,grid:\"Moderate\"},\n  {id:\"IBE_078\",lat:40.250,lng:-4.373,route:\"N-403\",chargers:4,demand:600,priority:0.03,grid:\"Moderate\"},\n  {id:\"IBE_079\",lat:40.440,lng:-4.561,route:\"N-403\",chargers:4,demand:600,priority:0.03,grid:\"Moderate\"},\n  {id:\"IBE_080\",lat:40.472,lng:-3.616,route:\"M-11\",chargers:4,demand:600,priority:0.008,grid:\"Moderate\"},\n  {id:\"IBE_081\",lat:42.021,lng:-1.575,route:\"A-68\",chargers:5,demand:750,priority:0.008,grid:\"Moderate\"},\n  {id:\"IBE_082\",lat:40.844,lng:-0.896,route:\"N-211\",chargers:4,demand:600,priority:0.008,grid:\"Moderate\"},\n  {id:\"IBE_083\",lat:40.874,lng:-0.493,route:\"N-211\",chargers:4,demand:600,priority:0.008,grid:\"Moderate\"},\n  {id:\"IBE_084\",lat:40.613,lng:-4.680,route:\"N-403A\",chargers:4,demand:600,priority:0.007,grid:\"Moderate\"},\n  {id:\"IBE_085\",lat:41.146,lng:1.317,route:\"AP-7N\",chargers:5,demand:750,priority:0.005,grid:\"Congested\"},\n  {id:\"IBE_086\",lat:38.887,lng:-1.402,route:\"A-31\",chargers:5,demand:750,priority:0.002,grid:\"Moderate\"},\n  {id:\"IBE_087\",lat:41.141,lng:-0.377,route:\"N-232\",chargers:4,demand:600,priority:0.002,grid:\"Moderate\"},\n];\n\nconst GCOLOR = {Congested:'#ef4444', Moderate:'#f59e0b', Sufficient:'#22c55e'};\nconst GLIGHT = {Congested:'red', Moderate:'yellow', Sufficient:'green'};\n\n// ── OFFLINE TILE LAYER ──\nconst OfflineTiles = L.TileLayer.extend({\n  createTile(coords, done) {\n    const img = document.createElement('img');\n    img.setAttribute('role', 'presentation');\n    const key = `${coords.z}/${coords.x}/${coords.y}`;\n    if (typeof TILE_CACHE !== 'undefined' && TILE_CACHE[key]) {\n      img.src = TILE_CACHE[key];\n      setTimeout(() => done(null, img), 0);\n    } else {\n      // Fallback to CDN when online\n      img.crossOrigin = '';\n      img.src = `https://a.basemaps.cartocdn.com/dark_all/${coords.z}/${coords.x}/${coords.y}.png`;\n      img.onload = () => done(null, img);\n      img.onerror = e => {\n        // Show dark placeholder\n        img.src = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';\n        done(null, img);\n      };\n    }\n    return img;\n  }\n});\n\n// ── MAP ──\nconst map = L.map('map', {center:[40.2,-3.5], zoom:6, zoomControl:false});\nL.control.zoom({position:'topright'}).addTo(map);\nnew OfflineTiles('', {minZoom:5, maxZoom:7, tileSize:256, attribution:'© CARTO © OpenStreetMap'}).addTo(map);\n\n// ── GLOW RINGS ──\nlet glowEnabled = true;\nconst glowMarkers = [];\n\n// ── MARKERS ──\nconst allMarkers = [];\n\nfunction chargerRadius(n) { return 5 + (n - 4) * 1.1; }\n\nfunction makePopup(s) {\n  return `<div class=\"p-head\">\n    <div class=\"p-id\">${s.id}<\u002Fdiv>\n    <div class=\"p-route\">Route: <strong>${s.route}<\u002Fstrong><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"p-body\">\n    <div class=\"p-row\"><span class=\"pk\">Chargers<\u002Fspan><span class=\"pv\">${s.chargers} units<\u002Fspan><\u002Fdiv>\n    <div class=\"p-row\"><span class=\"pk\">Demand<\u002Fspan><span class=\"pv\">${s.demand.toLocaleString()} kW<\u002Fspan><\u002Fdiv>\n    <div class=\"p-row\"><span class=\"pk\">Priority score<\u002Fspan><span class=\"pv\">${s.priority.toFixed(3)}<\u002Fspan><\u002Fdiv>\n    <div class=\"p-row\"><span class=\"pk\">Coordinates<\u002Fspan><span class=\"pv\">${s.lat.toFixed(3)}°N ${Math.abs(s.lng).toFixed(3)}°${s.lng<0?'W':'E'}<\u002Fspan><\u002Fdiv>\n    <div><span class=\"p-badge ${s.grid}\">${s.grid} grid<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nSITES.forEach((s, i) => {\n  const r = chargerRadius(s.chargers);\n  const color = GCOLOR[s.grid];\n\n  // Glow ring\n  const glow = L.circleMarker([s.lat, s.lng], {\n    radius: r + 5, color: color, fillColor: color,\n    fillOpacity: 0.15, weight: 6, opacity: 0.25, interactive: false\n  });\n  glow.addTo(map);\n  glowMarkers.push(glow);\n\n  const m = L.circleMarker([s.lat, s.lng], {\n    radius: r, color: '#fff', fillColor: color,\n    fillOpacity: 0.88, weight: 1.5, opacity: 1\n  });\n\n  m.bindPopup(makePopup(s), {maxWidth:260, minWidth:240});\n  m.bindTooltip(\n    `<div style=\"font-family:'Space Grotesk',sans-serif;font-size:12px;line-height:1.7;padding:2px 0;min-width:180px\">\n      <strong style=\"font-size:13px;color:#f0f9ff\">${s.id}<\u002Fstrong><br>\n      <span style=\"color:#94a3b8\">Route<\u002Fspan> <strong>${s.route}<\u002Fstrong><br>\n      <span style=\"color:#94a3b8\">Chargers<\u002Fspan> <strong>${s.chargers} units<\u002Fstrong> &nbsp;·&nbsp; ${s.demand} kW<br>\n      <span style=\"color:#94a3b8\">Priority<\u002Fspan> <strong>${s.priority.toFixed(3)}<\u002Fstrong><br>\n      <span style=\"color:${color};font-weight:700\">▸ ${s.grid} grid<\u002Fspan>\n    <\u002Fdiv>`,\n    {sticky: true, opacity: 1, className: ''}\n  );\n\n  m.siteData = s;\n  m.glowM = glow;\n\n  setTimeout(() => {\n    m.addTo(map);\n    const el = m.getElement();\n    if (el) { el.style.animation = 'popIn .3s cubic-bezier(.34,1.56,.64,1) forwards'; }\n  }, i * 10);\n\n  allMarkers.push(m);\n});\n\n// Counts\nconst cnt = {Congested:0, Moderate:0, Sufficient:0};\nSITES.forEach(s => cnt[s.grid]++);\ndocument.getElementById('cnt-red').textContent = cnt.Congested;\ndocument.getElementById('cnt-yellow').textContent = cnt.Moderate;\ndocument.getElementById('cnt-green').textContent = cnt.Sufficient;\n\n// ── FILTER ──\nlet activeFilter = 'all';\nfunction setFilter(f, btn) {\n  activeFilter = f;\n  document.querySelectorAll('.pill').forEach(p => p.className = 'pill');\n  const cls = f==='all'?'on-all':f==='green'?'on-green':f==='yellow'?'on-yellow':'on-red';\n  btn.classList.add(cls);\n  let shown = 0;\n  allMarkers.forEach(m => {\n    const g = GLIGHT[m.siteData.grid];\n    const vis = f === 'all' || g === f;\n    if (vis) { m.addTo(map); if(glowEnabled) m.glowM.addTo(map); shown++; }\n    else { m.remove(); m.glowM.remove(); }\n  });\n  const filt = f==='all' ? SITES : SITES.filter(s => GLIGHT[s.grid]===f);\n  document.getElementById('shown-count').textContent = shown;\n  document.getElementById('kv-sites').textContent = shown;\n  document.getElementById('kv-chargers').textContent = filt.reduce((a,s)=>a+s.chargers,0);\n  drawHeatmap();\n}\n\n// ── GLOW TOGGLE ──\nfunction toggleGlow(btn) {\n  glowEnabled = btn.classList.contains('on');\n  glowMarkers.forEach(g => glowEnabled ? g.addTo(map) : g.remove());\n}\n\n// ── OPACITY ──\nfunction setOpacity(v) { allMarkers.forEach(m => m.setStyle({fillOpacity: v/100})); }\n\n// ── HEATMAP ──\nconst hCanvas = document.getElementById('heatmap-canvas');\nlet heatOn = false;\n\nfunction drawHeatmap() {\n  if (!heatOn) { hCanvas.style.display='none'; return; }\n  const rect = document.getElementById('map-area').getBoundingClientRect();\n  hCanvas.width = rect.width; hCanvas.height = rect.height;\n  hCanvas.style.display = 'block';\n  const ctx = hCanvas.getContext('2d');\n  ctx.clearRect(0,0,hCanvas.width,hCanvas.height);\n  const vis = activeFilter==='all' ? SITES : SITES.filter(s=>GLIGHT[s.grid]===activeFilter);\n  vis.forEach(s => {\n    const pt = map.latLngToContainerPoint([s.lat, s.lng]);\n    const r = 55 + s.chargers * 5;\n    const rgb = s.grid==='Congested'?'239,68,68':s.grid==='Sufficient'?'34,197,94':'245,158,11';\n    const g = ctx.createRadialGradient(pt.x,pt.y,0,pt.x,pt.y,r);\n    g.addColorStop(0,`rgba(${rgb},.32)`);\n    g.addColorStop(.5,`rgba(${rgb},.1)`);\n    g.addColorStop(1,`rgba(${rgb},0)`);\n    ctx.beginPath(); ctx.arc(pt.x,pt.y,r,0,Math.PI*2);\n    ctx.fillStyle=g; ctx.fill();\n  });\n}\n\nfunction toggleHeatmap(btn) {\n  btn.classList.toggle('on');\n  heatOn = btn.classList.contains('on');\n  drawHeatmap();\n}\n\nmap.on('move zoom resize', () => { if(heatOn) drawHeatmap(); });\n\n// ── TWEAKS ──\nwindow.addEventListener('message', e => {\n  if (e.data?.type==='__activate_edit_mode') document.getElementById('tweaks-panel').style.display='block';\n  if (e.data?.type==='__deactivate_edit_mode') document.getElementById('tweaks-panel').style.display='none';\n});\nwindow.parent.postMessage({type:'__edit_mode_available'},'*');\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
